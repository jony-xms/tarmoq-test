<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tarmoq Xavfsizligi Testi</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', Arial, sans-serif; background: #f0f2f5; min-height: 100vh; padding: 20px; }
  .container { max-width: 800px; margin: 0 auto; }
  h1 { text-align: center; color: #1a1a2e; font-size: 26px; margin-bottom: 8px; }
  .subtitle { text-align: center; color: #666; margin-bottom: 20px; font-size: 14px; }

  .stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 20px; }
  .stat { background: white; border-radius: 12px; padding: 14px; text-align: center; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
  .stat-n { font-size: 26px; font-weight: 700; }
  .stat-l { font-size: 12px; color: #888; margin-top: 2px; }
  .green { color: #22c55e; }
  .red { color: #ef4444; }
  .blue { color: #3b82f6; }

  .progress-wrap { background: white; border-radius: 12px; padding: 14px 18px; margin-bottom: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
  .progress-top { display: flex; justify-content: space-between; font-size: 13px; color: #555; margin-bottom: 8px; }
  .progress-bar { background: #e5e7eb; border-radius: 8px; height: 10px; overflow: hidden; }
  .progress-fill { height: 100%; background: linear-gradient(90deg, #3b82f6, #6366f1); border-radius: 8px; transition: width 0.4s ease; }

  .topics { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 20px; }
  .topic-btn { padding: 7px 14px; border: 2px solid #e5e7eb; border-radius: 20px; cursor: pointer; font-size: 13px; background: white; color: #555; transition: all 0.2s; font-weight: 500; }
  .topic-btn:hover { border-color: #3b82f6; color: #3b82f6; }
  .topic-btn.active { background: #3b82f6; border-color: #3b82f6; color: white; }

  .card { background: white; border-radius: 16px; padding: 28px; box-shadow: 0 4px 16px rgba(0,0,0,0.1); }
  .q-num { font-size: 13px; color: #888; margin-bottom: 10px; font-weight: 500; }
  .q-text { font-size: 17px; font-weight: 600; color: #1a1a2e; margin-bottom: 22px; line-height: 1.5; }
  .options { display: flex; flex-direction: column; gap: 10px; }
  .opt { padding: 13px 18px; border: 2px solid #e5e7eb; border-radius: 10px; cursor: pointer; font-size: 15px; background: white; text-align: left; transition: all 0.2s; color: #333; line-height: 1.4; }
  .opt:hover:not(:disabled) { border-color: #3b82f6; background: #eff6ff; color: #1d4ed8; }
  .opt.correct { background: #dcfce7; border-color: #22c55e; color: #15803d; font-weight: 600; }
  .opt.wrong { background: #fee2e2; border-color: #ef4444; color: #dc2626; }
  .opt:disabled { cursor: default; }

  .feedback { margin-top: 16px; padding: 12px 16px; border-radius: 10px; font-size: 15px; font-weight: 500; display: none; }
  .feedback.show { display: block; }
  .feedback.ok { background: #dcfce7; color: #15803d; border-left: 4px solid #22c55e; }
  .feedback.no { background: #fee2e2; color: #dc2626; border-left: 4px solid #ef4444; }

  .next-btn { margin-top: 18px; padding: 12px 28px; background: #3b82f6; color: white; border: none; border-radius: 10px; font-size: 15px; font-weight: 600; cursor: pointer; display: none; transition: background 0.2s; }
  .next-btn:hover { background: #2563eb; }

  .done { text-align: center; padding: 20px; }
  .done-pct { font-size: 60px; font-weight: 800; margin: 10px 0; }
  .done-info { font-size: 16px; color: #666; margin-bottom: 20px; }
  .done-badge { display: inline-block; padding: 8px 22px; border-radius: 24px; font-size: 16px; font-weight: 700; margin-bottom: 16px; }
  .badge-a { background: #dcfce7; color: #15803d; }
  .badge-b { background: #dbeafe; color: #1d4ed8; }
  .badge-c { background: #fef9c3; color: #a16207; }
  .badge-d { background: #fee2e2; color: #dc2626; }
  .retry-btn { padding: 12px 28px; background: #6366f1; color: white; border: none; border-radius: 10px; font-size: 15px; font-weight: 600; cursor: pointer; margin: 6px; }
  .retry-btn:hover { background: #4f46e5; }

  @media (max-width: 500px) {
    .stats { grid-template-columns: repeat(2, 1fr); }
    .stat-n { font-size: 20px; }
    .q-text { font-size: 15px; }
    .opt { font-size: 14px; }
  }
</style>
</head>

</div>

let cur={t:0,q:0,correct:0,wrong:0,answered:false,qs:[]};

function shuffle(arr){return [...arr].sort(()=>Math.random()-0.5);}

function initTopic(i){
  cur={t:i,q:0,correct:0,wrong:0,answered:false,qs:shuffle(ALL[i].qs)};
  document.querySelectorAll('.topic-btn').forEach((b,j)=>b.classList.toggle('active',j===i));
  updateStats(); renderQ();
}

function updateStats(){
  const total=cur.correct+cur.wrong;
  document.getElementById('sTotal').textContent=total;
  document.getElementById('sCorrect').textContent=cur.correct;
  document.getElementById('sWrong').textContent=cur.wrong;
  document.getElementById('sPct').textContent=total>0?Math.round(cur.correct/total*100)+'%':'—';
  const p=cur.qs.length>0?Math.round(cur.q/cur.qs.length*100):0;
  document.getElementById('progFill').style.width=p+'%';
  document.getElementById('progPct').textContent=p+'%';
  document.getElementById('progText').textContent=ALL[cur.t].full+' — Savol '+Math.min(cur.q+1,cur.qs.length)+'/'+cur.qs.length;
}

function renderQ(){
  const area=document.getElementById('qArea');
  if(cur.q>=cur.qs.length){renderDone(area);return;}
  const q=cur.qs[cur.q];
  const opts=q.o.map((o,i)=>`<button class="opt" onclick="pick(${i})">${String.fromCharCode(65+i)}) ${o}</button>`).join('');
  area.innerHTML=`<div class="card">
    <div class="q-num">Savol ${cur.q+1} / ${cur.qs.length} — ${ALL[cur.t].full}</div>
    <div class="q-text">${q.q}</div>
    <div class="options">${opts}</div>
    <div class="feedback" id="fb"></div>
    <button class="next-btn" id="nxt" onclick="nextQ()">Keyingi savol →</button>
  </div>`;
}

function pick(i){
  if(cur.answered)return;
  cur.answered=true;
  const q=cur.qs[cur.q];
  const btns=document.querySelectorAll('.opt');
  btns.forEach(b=>b.disabled=true);
  btns[i].classList.add(i===q.a?'correct':'wrong');
  if(i!==q.a)btns[q.a].classList.add('correct');
  const fb=document.getElementById('fb');
  if(i===q.a){cur.correct++;fb.className='feedback show ok';fb.textContent='✓ To\'g\'ri!';}
  else{cur.wrong++;fb.className='feedback show no';fb.textContent='✗ Noto\'g\'ri. To\'g\'ri javob: '+String.fromCharCode(65+q.a)+') '+q.o[q.a];}
  updateStats();
  document.getElementById('nxt').style.display='block';
}

function nextQ(){cur.q++;cur.answered=false;updateStats();renderQ();}

function renderDone(area){
  const pct=Math.round(cur.correct/cur.qs.length*100);
  let badge,cls;
  if(pct>=85){badge='A\'lo natija! 🎉';cls='badge-a';}
  else if(pct>=70){badge='Yaxshi 👍';cls='badge-b';}
  else if(pct>=50){badge='O\'rtacha 📖';cls='badge-c';}
  else{badge='Yana mashq kerak 💪';cls='badge-d';}
  area.innerHTML=`<div class="card done">
    <div class="done-badge ${cls}">${badge}</div>
    <div class="done-pct">${pct}%</div>
    <div class="done-info">${cur.correct} ta to'g'ri / ${cur.qs.length} ta savol</div>
    <button class="retry-btn" onclick="initTopic(${cur.t})">🔄 Qayta urinish</button>
    ${cur.t<ALL.length-1?`<button class="retry-btn" style="background:#059669" onclick="initTopic(${cur.t+1})">Keyingi mavzu →</button>`:''}
  </div>`;
}

// Build topic buttons
const tb=document.getElementById('topicBtns');
ALL.forEach((t,i)=>{
  const b=document.createElement('button');
  b.className='topic-btn';
  b.textContent=t.t;
  b.title=t.full;
  b.onclick=()=>initTopic(i);
  tb.appendChild(b);
});
