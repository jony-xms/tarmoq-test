<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tarmoq Xavfsizligi Testi</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0a0e1a;
  --surface: #111827;
  --surface2: #1a2235;
  --border: rgba(255,255,255,0.08);
  --accent: #4f8ef7;
  --accent2: #7c3aed;
  --green: #10b981;
  --red: #f43f5e;
  --yellow: #f59e0b;
  --text: #f1f5f9;
  --muted: #64748b;
  --muted2: #94a3b8;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}

/* Background grid */
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(79,142,247,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(79,142,247,0.03) 1px,transparent 1px);background-size:40px 40px;pointer-events:none;z-index:0}

.wrap{position:relative;z-index:1;max-width:820px;margin:0 auto;padding:24px 16px 60px}

/* Header */
.header{text-align:center;padding:40px 0 32px}
.header-tag{display:inline-block;font-size:11px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:var(--accent);background:rgba(79,142,247,0.1);border:1px solid rgba(79,142,247,0.2);border-radius:20px;padding:5px 14px;margin-bottom:16px}
.header h1{font-family:'Syne',sans-serif;font-size:clamp(28px,5vw,44px);font-weight:800;line-height:1.1;margin-bottom:10px;background:linear-gradient(135deg,#f1f5f9 30%,#4f8ef7);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.header p{color:var(--muted2);font-size:15px;font-weight:300}

/* Stats */
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:20px}
.stat{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:16px 12px;text-align:center;transition:transform 0.2s}
.stat:hover{transform:translateY(-2px)}
.stat-n{font-family:'Syne',sans-serif;font-size:28px;font-weight:700;line-height:1}
.stat-l{font-size:11px;color:var(--muted);margin-top:4px;text-transform:uppercase;letter-spacing:0.5px}
.s-blue{color:var(--accent)}
.s-green{color:var(--green)}
.s-red{color:var(--red)}
.s-purple{color:#a78bfa}

/* Progress */
.prog-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:16px 20px;margin-bottom:20px}
.prog-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.prog-label{font-size:13px;color:var(--muted2);font-weight:500}
.prog-pct{font-family:'Syne',sans-serif;font-size:15px;font-weight:700;color:var(--accent)}
.prog-bar{background:rgba(255,255,255,0.06);border-radius:6px;height:6px;overflow:hidden}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:6px;transition:width 0.5s cubic-bezier(.4,0,.2,1);width:0%}

/* Topics */
.topics{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:24px}
.topic-btn{padding:8px 16px;border:1px solid var(--border);border-radius:10px;cursor:pointer;font-size:12px;font-weight:600;background:var(--surface);color:var(--muted2);transition:all 0.2s;font-family:'Syne',sans-serif;letter-spacing:0.3px}
.topic-btn:hover{border-color:var(--accent);color:var(--accent);background:rgba(79,142,247,0.06)}
.topic-btn.active{background:var(--accent);border-color:var(--accent);color:#fff}

/* Question card */
.q-card{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:28px;animation:fadeUp 0.3s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}

.q-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px}
.q-badge{font-size:11px;font-weight:600;color:var(--muted);letter-spacing:1px;text-transform:uppercase;background:rgba(255,255,255,0.05);padding:4px 12px;border-radius:8px}
.q-counter{font-family:'Syne',sans-serif;font-size:13px;color:var(--muted2)}

.q-text{font-size:18px;font-weight:500;color:var(--text);margin-bottom:24px;line-height:1.55;border-left:3px solid var(--accent);padding-left:16px}

.options{display:flex;flex-direction:column;gap:10px}
.opt{padding:14px 18px;border:1px solid var(--border);border-radius:12px;cursor:pointer;font-size:14px;background:var(--surface2);color:var(--muted2);text-align:left;transition:all 0.18s;line-height:1.45;display:flex;align-items:center;gap:12px}
.opt-letter{width:26px;height:26px;border-radius:8px;background:rgba(255,255,255,0.06);display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-size:12px;font-weight:700;flex-shrink:0;color:var(--muted);transition:all 0.18s}
.opt:hover:not(:disabled){border-color:var(--accent);background:rgba(79,142,247,0.08);color:var(--text)}
.opt:hover:not(:disabled) .opt-letter{background:var(--accent);color:#fff}
.opt.correct{border-color:var(--green);background:rgba(16,185,129,0.1);color:var(--green)}
.opt.correct .opt-letter{background:var(--green);color:#fff}
.opt.wrong{border-color:var(--red);background:rgba(244,63,94,0.1);color:var(--red)}
.opt.wrong .opt-letter{background:var(--red);color:#fff}
.opt:disabled{cursor:default}

.feedback{margin-top:16px;padding:13px 16px;border-radius:12px;font-size:14px;font-weight:500;display:none;animation:fadeUp 0.25s ease}
.feedback.show{display:flex;align-items:center;gap:10px}
.feedback.ok{background:rgba(16,185,129,0.1);color:var(--green);border:1px solid rgba(16,185,129,0.2)}
.feedback.no{background:rgba(244,63,94,0.1);color:#fda4af;border:1px solid rgba(244,63,94,0.2)}
.fb-icon{font-size:18px;flex-shrink:0}

.next-btn{margin-top:20px;padding:13px 32px;background:linear-gradient(135deg,var(--accent),var(--accent2));color:white;border:none;border-radius:12px;font-size:14px;font-weight:600;cursor:pointer;display:none;font-family:'Syne',sans-serif;letter-spacing:0.5px;transition:opacity 0.2s,transform 0.2s}
.next-btn:hover{opacity:0.9;transform:translateY(-1px)}

/* Done */
.done-card{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:40px 28px;text-align:center;animation:fadeUp 0.4s ease}
.done-ring{width:120px;height:120px;margin:0 auto 24px;position:relative}
.done-ring svg{transform:rotate(-90deg)}
.done-ring-num{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-size:26px;font-weight:800}
.done-badge{display:inline-block;padding:6px 20px;border-radius:20px;font-size:13px;font-weight:700;margin-bottom:12px;font-family:'Syne',sans-serif;letter-spacing:0.5px}
.done-title{font-family:'Syne',sans-serif;font-size:22px;font-weight:700;margin-bottom:6px}
.done-sub{color:var(--muted2);font-size:14px;margin-bottom:28px}
.done-actions{display:flex;gap:12px;justify-content:center;flex-wrap:wrap}
.btn-retry{padding:12px 24px;border:1px solid var(--border);background:var(--surface2);color:var(--text);border-radius:12px;cursor:pointer;font-size:14px;font-weight:600;font-family:'Syne',sans-serif;transition:all 0.2s}
.btn-retry:hover{border-color:var(--accent);color:var(--accent)}
.btn-next{padding:12px 24px;background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;border:none;border-radius:12px;cursor:pointer;font-size:14px;font-weight:600;font-family:'Syne',sans-serif;transition:opacity 0.2s}
.btn-next:hover{opacity:0.85}

/* Welcome */
.welcome{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:40px;text-align:center}
.welcome-icon{font-size:48px;margin-bottom:16px}
.welcome-title{font-family:'Syne',sans-serif;font-size:20px;font-weight:700;margin-bottom:8px}
.welcome-text{color:var(--muted2);font-size:14px;line-height:1.6}

/* Streak */
.streak{display:flex;gap:6px;margin-bottom:20px;flex-wrap:wrap}
.streak-dot{width:10px;height:10px;border-radius:50%;background:rgba(255,255,255,0.08);transition:background 0.3s}
.streak-dot.ok{background:var(--green)}
.streak-dot.no{background:var(--red)}

@media(max-width:500px){
  .stats{grid-template-columns:repeat(2,1fr)}
  .stat-n{font-size:22px}
  .q-text{font-size:16px}
  .header h1{font-size:28px}
}
</style>
</head>

function shuffle(arr){return [...arr].sort(()=>Math.random()-0.5)}

// Shuffle options but keep track of correct answer
function shuffleOptions(q){
  const correct = q.o[q.a];
  const shuffled = shuffle([...q.o]);
  return { opts: shuffled, correctIdx: shuffled.indexOf(correct) };
}

let cur={t:0,q:0,correct:0,wrong:0,answered:false,qs:[],history:[]};

function initTopic(i){
  cur={t:i,q:0,correct:0,wrong:0,answered:false,qs:shuffle(ALL[i].qs),history:[]};
  document.querySelectorAll('.topic-btn').forEach((b,j)=>b.classList.toggle('active',j===i));
  updateStats();updateStreak();renderQ();
}

function updateStats(){
  const total=cur.correct+cur.wrong;
  document.getElementById('sTotal').textContent=total;
  document.getElementById('sCorrect').textContent=cur.correct;
  document.getElementById('sWrong').textContent=cur.wrong;
  document.getElementById('sPct').textContent=total>0?Math.round(cur.correct/total*100)+'%':'—';
  const p=cur.qs.length>0?Math.round(cur.q/cur.qs.length*100):0;
  document.getElementById('progFill').style.width=p+'%';
  document.getElementById('progPct').textContent=p+'%';
  document.getElementById('progLabel').textContent=ALL[cur.t].full+' — '+Math.min(cur.q+1,cur.qs.length)+'/'+cur.qs.length;
}

function updateStreak(){
  const s=document.getElementById('streak');
  s.innerHTML=cur.history.slice(-20).map(v=>`<div class="streak-dot ${v?'ok':'no'}"></div>`).join('');
}

function renderQ(){
  const area=document.getElementById('qArea');
  if(cur.q>=cur.qs.length){renderDone(area);return;}
  const q=cur.qs[cur.q];
  const {opts,correctIdx}=shuffleOptions(q);
  const letters=['A','B','C','D'];
  const optHtml=opts.map((o,i)=>`<button class="opt" onclick="pick(${i},${correctIdx})"><span class="opt-letter">${letters[i]}</span>${o}</button>`).join('');
  area.innerHTML=`<div class="q-card">
    <div class="q-header">
      <span class="q-badge">${ALL[cur.t].full}</span>
      <span class="q-counter">${cur.q+1} / ${cur.qs.length}</span>
    </div>
    <div class="q-text">${q.q}</div>
    <div class="options">${optHtml}</div>
    <div class="feedback" id="fb"></div>
    <button class="next-btn" id="nxt" onclick="nextQ()">${cur.q+1<cur.qs.length?'Keyingi savol →':'Natijani ko\'rish →'}</button>
  </div>`;
}

function pick(i,correctIdx){
  if(cur.answered)return;
  cur.answered=true;
  const btns=document.querySelectorAll('.opt');
  btns.forEach(b=>b.disabled=true);
  const isCorrect=i===correctIdx;
  btns[i].classList.add(isCorrect?'correct':'wrong');
  if(!isCorrect)btns[correctIdx].classList.add('correct');
  const fb=document.getElementById('fb');
  if(isCorrect){
    cur.correct++;cur.history.push(true);
    fb.className='feedback show ok';
    fb.innerHTML='<span class="fb-icon">✓</span><span>To\'g\'ri! Zo\'r!</span>';
  } else {
    cur.wrong++;cur.history.push(false);
    fb.className='feedback show no';
    fb.innerHTML='<span class="fb-icon">✗</span><span>Noto\'g\'ri. To\'g\'ri javob yashil rangda ko\'rsatildi.</span>';
  }
  updateStats();updateStreak();
  document.getElementById('nxt').style.display='inline-block';
}

function nextQ(){cur.q++;cur.answered=false;updateStats();renderQ();}

function renderDone(area){
  const total=cur.qs.length;
  const pct=Math.round(cur.correct/total*100);
  const r=40;const circ=2*Math.PI*r;const dash=circ*(pct/100);
  let badge,bc,color;
  if(pct>=85){badge="A'lo natija! 🎉";bc="rgba(16,185,129,0.15)";color="#10b981";}
  else if(pct>=70){badge="Yaxshi! 👍";bc="rgba(79,142,247,0.15)";color="#4f8ef7";}
  else if(pct>=50){badge="O'rtacha 📖";bc="rgba(245,158,11,0.15)";color="#f59e0b";}
  else{badge="Yana mashq kerak 💪";bc="rgba(244,63,94,0.15)";color="#f43f5e";}
  area.innerHTML=`<div class="done-card">
    <div class="done-ring">
      <svg width="120" height="120" viewBox="0 0 100 100">
        <circle cx="50" cy="50" r="${r}" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="8"/>
        <circle cx="50" cy="50" r="${r}" fill="none" stroke="${color}" stroke-width="8"
          stroke-dasharray="${dash} ${circ}" stroke-linecap="round"/>
      </svg>
      <div class="done-ring-num" style="color:${color}">${pct}%</div>
    </div>
    <div class="done-badge" style="background:${bc};color:${color}">${badge}</div>
    <div class="done-title">${cur.correct} / ${total} to'g'ri</div>
    <div class="done-sub">${ALL[cur.t].full} mavzusi yakunlandi</div>
    <div class="done-actions">
      <button class="btn-retry" onclick="initTopic(${cur.t})">🔄 Qayta urinish</button>
      ${cur.t<ALL.length-1?`<button class="btn-next" onclick="initTopic(${cur.t+1})">Keyingi mavzu →</button>`:'<button class="btn-next" onclick="initTopic(0)">Boshidan boshlash →</button>'}
    </div>
  </div>`;
}

// Build topic buttons
const tb=document.getElementById('topicBtns');
ALL.forEach((t,i)=>{
  const b=document.createElement('button');
  b.className='topic-btn';b.textContent=t.t;b.title=t.full;
  b.onclick=()=>initTopic(i);
  tb.appendChild(b);
});
</script>
</body>
</html>
